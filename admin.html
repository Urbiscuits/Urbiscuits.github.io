<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员题库</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-color: #5c6bc0;
            --primary-hover: #7986cb;
            --light-bg: #fafafa;
            --surface: #ffffff;
            --border-color: #e0e0e0;
            --text-primary: #424242;
            --text-secondary: #757575;
            --border-radius: 6px;
            --nav-width: 220px;
            --transition: all 0.2s ease;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif;
            background: var(--light-bg);
            min-height: 100vh;
            color: var(--text-primary);
        }
        .container { display: flex; min-height: 100vh; }
        .nav-sidebar {
            width: var(--nav-width);
            min-width: var(--nav-width);
            background: var(--surface);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 300;
        }
        .nav-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border-color);
        }
        .nav-header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-header h1 i { color: var(--primary-color); font-size: 1.2rem; }
        .nav-header p { font-size: 0.75rem; color: var(--text-secondary); margin-top: 4px; margin-left: 26px; }
        .nav-menu {
            flex: 1;
            overflow-y: auto;
            padding: 12px 0;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            margin: 2px 12px;
            font-size: 0.9rem;
            color: var(--text-primary);
            text-decoration: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            border: none;
            background: none;
            width: calc(100% - 24px);
            text-align: left;
            font-family: inherit;
        }
        .nav-item:hover { background: #f5f5f5; color: var(--primary-color); }
        .nav-item.active { background: rgba(92, 107, 192, 0.08); color: var(--primary-color); font-weight: 500; }
        .nav-item i { width: 18px; text-align: center; font-size: 0.95rem; }
        .main-area {
            flex: 1;
            margin-left: var(--nav-width);
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }
        .main-area iframe {
            display: block;
            width: 100%;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="nav-sidebar">
            <div class="nav-header">
                <h1><i class="fas fa-shield-alt"></i> 管理员题库</h1>
                <p>功能入口</p>
            </div>
            <nav class="nav-menu" id="nav-menu">
                <button type="button" class="nav-item" data-section="admin-section-sync" onclick="adminNavTo('admin-section-sync')"><i class="fas fa-cloud-upload-alt"></i> 数据同步操作</button>
                <button type="button" class="nav-item" data-section="admin-section-miniprogram" onclick="adminNavTo('admin-section-miniprogram')"><i class="fas fa-mobile-alt"></i> 从小程序保存题库</button>
                <button type="button" class="nav-item" data-section="admin-section-delete-json" onclick="adminNavTo('admin-section-delete-json')"><i class="fas fa-exclamation-triangle"></i> 删除和重置多个 JSON 文件</button>
                <button type="button" class="nav-item" data-section="admin-section-github" onclick="adminNavTo('admin-section-github')"><i class="fas fa-github"></i> GitHub 同步配置</button>
                <button type="button" class="nav-item" data-section="admin-section-users" onclick="adminNavTo('admin-section-users')"><i class="fas fa-users-cog"></i> 用户管理</button>
                <button type="button" class="nav-item" data-section="admin-section-sets" onclick="adminNavTo('admin-section-sets')"><i class="fas fa-folder-open"></i> 套卷管理</button>
                <button type="button" class="nav-item" data-section="admin-section-stats" onclick="adminNavTo('admin-section-stats')"><i class="fas fa-chart-bar"></i> 题目统计（管理员题库）</button>
                <button type="button" class="nav-item" data-section="admin-section-subcategory" onclick="adminNavTo('admin-section-subcategory')"><i class="fas fa-tags"></i> 小类名称维护/合并</button>
                <button type="button" class="nav-item" data-section="admin-section-knowledge" onclick="adminNavTo('admin-section-knowledge')"><i class="fas fa-book"></i> 知识管理</button>
            </nav>
        </aside>
        <div class="main-area">
            <iframe id="adminFrame" title="管理员题库内容"></iframe>
        </div>
    </div>
    <script>
        (function() {
            var frame = document.getElementById('adminFrame');
            if (frame) {
                var qs = window.location.search || '';
                frame.src = 'index.html' + qs + (qs ? '&' : '?') + '_admin=1#admin';
            }
        })();
        function adminNavTo(sectionId) {
            var frame = document.getElementById('adminFrame');
            if (!frame || !frame.contentWindow) return;
            try {
                var doc = frame.contentDocument || frame.contentWindow.document;
                var el = doc.getElementById(sectionId);
                if (el) {
                    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            } catch (e) {}
            document.querySelectorAll('.nav-item').forEach(function(item) {
                item.classList.toggle('active', item.getAttribute('data-section') === sectionId);
            });
        }
        document.getElementById('adminFrame').addEventListener('load', function() {
            var frame = this;
            try {
                var doc = frame.contentDocument || frame.contentWindow.document;
                if (doc && doc.body) {
                    doc.body.classList.add('admin-iframe-loaded');
                }
            } catch (e) {}
        });
    </script>
</body>
</html>
